<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CHASKY GIROS</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#c0c9d4;
min-height:100vh;
padding:8px;
}

.container{
max-width:480px;
margin:auto;
width:100%;
}

.panel{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
padding:10px;
border-radius:14px;
margin-bottom:12px;
border:1px solid rgba(255,255,255,0.3);
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.fila1{
display:grid;
grid-template-columns:1fr auto;
gap:6px;
align-items:center;
margin-bottom:6px;
}

.fila1 .field{
margin-bottom:0;
}

.fila1 .field label{
display:block;
font-size:10px;
font-weight:700;
margin-bottom:2px;
color:#374151;
}

.fila1 .field select{
width:100%;
height:34px;
background:white;
border:2px solid #d1d5db;
border-radius:8px;
padding:0 8px;
color:#111827;
font-size:12px;
transition:border-color 0.3s;
outline:none;
}

.fila1 .field select:focus{
border-color:#f59e0b;
box-shadow:0 0 0 3px rgba(245,158,11,0.1);
}

.operacion-wrapper{
display:flex;
gap:5px;
align-items:center;
}

.operacion-wrapper select{
flex:1;
min-width:0;
}

.ref-tc{
font-size:14px;
font-weight:800;
color:#f59e0b;
background:#1f2937;
padding:2px 10px;
border-radius:5px;
white-space:nowrap;
min-width:60px;
text-align:center;
height:34px;
display:flex;
align-items:center;
justify-content:center;
border:2px solid #f59e0b;
}

#btnConfig{
background:#374151;
color:white;
border:none;
border-radius:8px;
width:36px;
height:34px;
cursor:pointer;
font-size:15px;
transition:all 0.3s;
display:flex;
align-items:center;
justify-content:center;
}

#btnConfig:hover{
background:#f59e0b;
transform:rotate(90deg);
}

.config-panel{
max-height:0;
overflow:hidden;
transition:max-height 0.4s ease, opacity 0.3s ease, padding 0.3s ease;
opacity:0;
padding:0 5px;
}

.config-panel.abierto{
max-height:500px;
opacity:1;
padding:6px 5px 5px 5px;
}

.config-panel .field{
margin-bottom:5px;
}

.config-panel .field label{
display:block;
font-size:10px;
font-weight:700;
margin-bottom:2px;
color:#374151;
}

.config-panel .field input{
width:100%;
height:32px;
background:white;
border:2px solid #d1d5db;
border-radius:6px;
padding:0 8px;
color:#111827;
font-size:12px;
transition:border-color 0.3s;
outline:none;
}

.config-panel .field input:focus{
border-color:#f59e0b;
box-shadow:0 0 0 3px rgba(245,158,11,0.1);
}

.config-panel .grid-config{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

.fila2{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

.fila2 .field{
margin-bottom:0;
}

.fila2 .field label{
display:block;
font-size:10px;
font-weight:700;
margin-bottom:2px;
color:#374151;
}

.fila2 .field input{
width:100%;
height:38px;
background:white;
border:2px solid #d1d5db;
border-radius:8px;
padding:0 10px;
color:#111827;
font-size:14px;
font-weight:700;
transition:border-color 0.3s;
outline:none;
}

.fila2 .field input:focus{
border-color:#f59e0b;
box-shadow:0 0 0 3px rgba(245,158,11,0.1);
}

.moneda-label{
font-size:10px;
font-weight:700;
color:#6b7280;
margin-left:3px;
}

.buttons{
display:flex;
gap:6px;
margin-top:8px;
}

.buttons button{
flex:1;
height:36px;
border:none;
border-radius:8px;
font-weight:700;
font-size:12px;
cursor:pointer;
transition:transform 0.2s;
}

.buttons button:active{
transform:scale(0.96);
}

#btnLimpiar{
background:#9ca3af;
color:white;
}

#btnGuardar{
background:#f59e0b;
color:black;
}

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
width:100%;
max-width:480px;
margin:0 auto;
position:relative;
}

.header{
background:linear-gradient(135deg, #0a2a5a, #062040);
border-bottom:3px solid #3a7adf;
padding:6px 14px 4px;
text-align:center;
position:relative;
z-index:1;
overflow:hidden;
}

#tituloEmpresa{
color:#c39717;
font-size:clamp(14px, 3.8vw, 18px);
letter-spacing:1px;
font-weight:900;
position:relative;
z-index:2;
}

.fila-fecha-tc{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
margin-top:1px;
position:relative;
z-index:2;
flex-wrap:wrap;
}

.fecha-text{
color:#c39717;
font-size:clamp(10px, 2.5vw, 12px);
font-weight:800;
}

.currency-chaskys{
background:linear-gradient(135deg, #1a3a6a, #0a2a4a);
color:white;
font-weight:800;
display:flex;
justify-content:space-between;
align-items:center;
padding:6px 10px;
font-size:clamp(11px, 2.8vw, 13px);
letter-spacing:0.3px;
position:relative;
z-index:1;
}

.currency-chaskys .operacion-text{
color:white;
font-size:clamp(10px, 2.5vw, 13px);
}

.currency-chaskys .tc-chaskys-bar{
background:#d1d5db !important;
color:#8B0000 !important;
font-size:clamp(16px, 4vw, 20px) !important;
font-weight:800;
padding:3px 12px;
border-radius:4px;
}

.content-horizontal-chaskys{
padding:10px 14px 4px;
background:white;
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
gap:4px;
text-align:center;
position:relative;
z-index:1;
}

.content-horizontal-chaskys .col{
display:flex;
flex-direction:column;
align-items:center;
}

.content-horizontal-chaskys .label{
font-size:clamp(9px, 2.2vw, 11px);
text-transform:uppercase;
color:#6b7280;
font-weight:700;
letter-spacing:0.8px;
margin-bottom:1px;
}

.content-horizontal-chaskys .valor{
display:flex;
align-items:center;
gap:3px;
flex-wrap:wrap;
justify-content:center;
}

.content-horizontal-chaskys .send{
font-size:clamp(20px, 5.5vw, 26px);
font-weight:900;
color:#111111;
}

.content-horizontal-chaskys .moneda-send-h{
font-size:clamp(12px, 3vw, 16px);
font-weight:700;
color:#6b7280;
}

.content-horizontal-chaskys .arrow{
font-size:clamp(20px, 5vw, 26px);
font-weight:700;
color:#3a7adf;
}

.content-horizontal-chaskys .receive{
font-size:clamp(20px, 5.5vw, 26px);
font-weight:900;
color:#1a3a6a;
}

.content-horizontal-chaskys .moneda-receive-h{
font-size:clamp(12px, 3vw, 16px);
font-weight:700;
color:#6b7280;
}

.content-horizontal-chaskys .comision-center{
grid-column:1 / -1;
text-align:center;
font-size:clamp(9px, 2.2vw, 11px);
font-weight:700;
color:#000000;
background:#d1d5db;
padding:2px 10px;
border-radius:14px;
border:1px solid #9ca3af;
margin-top:-1px;
letter-spacing:0.3px;
}

.content-horizontal-chaskys .hora-center{
grid-column:1 / -1;
text-align:center;
font-size:clamp(10px, 2.5vw, 12px);
font-weight:700;
color:#1a3a6a;
margin-top:1px;
letter-spacing:0.5px;
}

.watermark-table{
position:absolute;
top:30%;
left:50%;
transform:translate(-50%, -50%);
z-index:0;
pointer-events:none;
text-align:center;
opacity:0.15;
user-select:none;
width:90%;
}

.watermark-table .wm-big{
font-size:clamp(24px, 6vw, 42px);
font-weight:900;
color:#b0b0b0;
letter-spacing:3px;
line-height:1.1;
text-transform:uppercase;
}

.watermark-table .wm-phone{
font-size:clamp(18px, 4.5vw, 32px);
font-weight:700;
color:#b0b0b0;
letter-spacing:1.5px;
margin-top:1px;
}

.footer-chaskys{
padding:4px 12px 6px;
display:flex;
justify-content:space-between;
border-top:2px solid #1a3a6a;
color:#6b7280;
font-weight:600;
font-size:clamp(6px, 1.5vw, 8px);
background:white;
text-align:center;
letter-spacing:0.2px;
text-transform:uppercase;
position:relative;
z-index:1;
}

.footer-chaskys .footer-left{
color:#555555;
}

.footer-chaskys .footer-right{
color:#1a3a6a;
font-weight:700;
}

@media (max-width:360px){
body{padding:5px;}
.panel{padding:8px;border-radius:10px;}
.fila1{grid-template-columns:1fr auto;gap:4px;}
.fila1 .field select{height:30px;font-size:11px;padding:0 6px;}
.ref-tc{height:30px;font-size:12px;min-width:50px;padding:0 6px;}
#btnConfig{width:30px;height:30px;font-size:13px;}
.fila2 .field input{height:34px;font-size:13px;padding:0 6px;}
.buttons button{height:32px;font-size:11px;}
.config-panel .field input{height:28px;font-size:11px;}
.header{padding:4px 10px 3px;}
#tituloEmpresa{font-size:clamp(12px, 3.2vw, 15px);}
.fecha-text{font-size:clamp(9px, 2.2vw, 11px);}
.currency-chaskys{padding:4px 8px;font-size:clamp(10px, 2.5vw, 12px);}
.currency-chaskys .tc-chaskys-bar{font-size:clamp(13px, 3.2vw, 16px) !important;padding:2px 8px;}
.content-horizontal-chaskys{padding:8px 10px 3px;}
.content-horizontal-chaskys .send,
.content-horizontal-chaskys .receive{font-size:clamp(18px, 5vw, 22px);}
.content-horizontal-chaskys .moneda-send-h,
.content-horizontal-chaskys .moneda-receive-h{font-size:clamp(10px, 2.5vw, 13px);}
.content-horizontal-chaskys .arrow{font-size:clamp(18px, 4.5vw, 22px);}
.watermark-table .wm-big{font-size:clamp(16px, 4.5vw, 22px);}
.watermark-table .wm-phone{font-size:clamp(12px, 3.5vw, 16px);}
}

@media (max-height:500px) and (orientation:landscape){
.header{padding:4px 10px 2px;}
#tituloEmpresa{font-size:clamp(12px, 2.5vw, 16px);}
.fila-fecha-tc{margin-top:0;gap:6px;}
.fecha-text{font-size:clamp(8px, 1.8vw, 11px);}
.currency-chaskys{padding:3px 8px;font-size:clamp(9px, 2vw, 12px);}
.currency-chaskys .tc-chaskys-bar{font-size:clamp(12px, 2.8vw, 16px) !important;padding:2px 8px;}
.content-horizontal-chaskys{padding:6px 10px 3px;gap:3px;}
.content-horizontal-chaskys .send,
.content-horizontal-chaskys .receive{font-size:clamp(14px, 3vw, 20px);}
.content-horizontal-chaskys .moneda-send-h,
.content-horizontal-chaskys .moneda-receive-h{font-size:clamp(9px, 2vw, 12px);}
.content-horizontal-chaskys .arrow{font-size:clamp(14px, 3vw, 20px);}
.content-horizontal-chaskys .label{font-size:clamp(8px, 1.8vw, 10px);}
.content-horizontal-chaskys .hora-center{font-size:clamp(8px, 1.8vw, 10px);margin-top:0;}
.content-horizontal-chaskys .comision-center{font-size:clamp(7px, 1.5vw, 9px);padding:1px 8px;}
.footer-chaskys{padding:3px 10px 4px;font-size:clamp(5px, 1.2vw, 7px);}
.watermark-table .wm-big{font-size:clamp(14px, 3vw, 24px);}
.watermark-table .wm-phone{font-size:clamp(10px, 2.2vw, 18px);}
.watermark-table{top:28%;}
}

@media (min-width:481px) and (max-width:768px){
.container{max-width:400px;}
}

@media (-webkit-min-device-pixel-ratio:2), (min-resolution:192dpi){
.card{border-radius:18px;}
}

</style>
</head>
<body>
<div class="container">

<div class="panel">

<div class="fila1">
    <div class="field">
        <label>OPERACIÓN</label>
        <div class="operacion-wrapper">
            <select id="operacion">
                <option value="bs_soles">BS → SOLES</option>
                <option value="soles_bs">SOLES → BS</option>
            </select>
            <span id="refTc" class="ref-tc">T/C 0.00</span>
        </div>
    </div>
    <button id="btnConfig">⚙️</button>
</div>

<div id="configPanel" class="config-panel">
    <div class="grid-config">
        <div class="field">
            <label>TC BS → SOLES</label>
            <input type="number" id="tcBsSoles" value="2.92" step="0.01">
        </div>
        <div class="field">
            <label>TC SOLES → BS</label>
            <input type="number" id="tcSolesBs" value="2.76" step="0.01">
        </div>
        <div class="field" style="grid-column:span 2;">
            <label>COMISIÓN CHASKYS (%)</label>
            <input type="number" id="comision" value="3" step="0.1" min="0" max="100">
        </div>
    </div>
</div>

<div class="fila2">
    <div class="field">
        <label id="labelDeposita">DEPOSITA <span class="moneda-label" id="monedaDeposita">(BS)</span></label>
        <input type="number" id="depositar">
    </div>
    <div class="field">
        <label id="labelRecibe">RECIBE <span class="moneda-label" id="monedaRecibe">(SOLES)</span></label>
        <input type="number" id="recibe">
    </div>
</div>

<div class="buttons">
    <button id="btnLimpiar">LIMPIAR</button>
    <button id="btnGuardar">📸 GUARDAR</button>
</div>

</div>

<div id="tarjeta" class="card">

<div class="header">
<div id="tituloEmpresa">CHASKY GIROS</div>
<div class="fila-fecha-tc">
    <span id="fechaText" class="fecha-text">17 JUN 2026</span>
</div>
</div>

<div id="barraOperacionChaskys" class="currency-chaskys">
    <span class="operacion-text" id="operacionTexto">SOLES → BOLIVIANOS</span>
    <span class="tc-chaskys-bar" id="tcChaskysBar">T/C 2.76</span>
</div>

<div id="contenidoChaskys" class="content-horizontal-chaskys">

<div class="watermark-table">
    <div class="wm-big">CHASKY GIROS</div>
    <div class="wm-phone">77713543</div>
</div>

<div class="col">
    <div class="label" id="labelDepositaC">Deposita</div>
    <div class="valor">
        <span id="enviaVistaC" class="send">0.00</span>
        <span id="monedaSendC" class="moneda-send-h">BS</span>
    </div>
</div>

<div class="arrow" id="flechaChaskys">→</div>

<div class="col">
    <div class="label" id="labelRecibeC">Recibe</div>
    <div class="valor">
        <span id="recibeVistaC" class="receive">0.00</span>
        <span id="monedaRecibeC" class="moneda-receive-h">SOLES</span>
    </div>
</div>

<div class="hora-center" id="horaCentral">--:--</div>

<div class="comision-center" id="comisionCenterChaskys">COMISIÓN 0.00 BS (3%)</div>

</div>

<div class="footer-chaskys">
    <span class="footer-left">ESTA COTIZACION TIENE VIGENCIA DE 15 MIN.</span>
    <span class="footer-right" id="ahFooter">A:H</span>
</div>

</div>

</div>
<script>

const operacion=document.getElementById("operacion");
const tcBsSoles=document.getElementById("tcBsSoles");
const tcSolesBs=document.getElementById("tcSolesBs");
const comision=document.getElementById("comision");
const depositar=document.getElementById("depositar");
const recibe=document.getElementById("recibe");
const tarjeta=document.getElementById("tarjeta");
const operacionTexto=document.getElementById("operacionTexto");
const tcChaskysBar=document.getElementById("tcChaskysBar");
const enviaVistaC=document.getElementById("enviaVistaC");
const recibeVistaC=document.getElementById("recibeVistaC");
const refTc=document.getElementById("refTc");
const fechaText=document.getElementById("fechaText");
const comisionCenterChaskys=document.getElementById("comisionCenterChaskys");
const horaCentral=document.getElementById("horaCentral");
const ahFooter=document.getElementById("ahFooter");
const monedaSendC=document.getElementById("monedaSendC");
const monedaRecibeC=document.getElementById("monedaRecibeC");
const monedaDeposita=document.getElementById("monedaDeposita");
const monedaRecibe=document.getElementById("monedaRecibe");
const btnConfig=document.getElementById("btnConfig");
const configPanel=document.getElementById("configPanel");

let configAbierto=false;
let ultimoCampo="depositar";

function formato(n){return Number(n).toFixed(2);}

function actualizarMonedas(){
if(operacion.value==="bs_soles"){
monedaDeposita.textContent="(BS)";
monedaRecibe.textContent="(SOLES)";
monedaSendC.textContent="BS";
monedaRecibeC.textContent="SOLES";
}else{
monedaDeposita.textContent="(SOLES)";
monedaRecibe.textContent="(BS)";
monedaSendC.textContent="SOLES";
monedaRecibeC.textContent="BS";
}
}

function getTcMostrado(){
if(operacion.value==="bs_soles"){
return parseFloat(tcBsSoles.value||0);
}else{
return parseFloat(tcSolesBs.value||0);
}
}

function getComision(){return parseFloat(comision.value||0)/100;}

function getValorComisionBs(){
let dep=parseFloat(depositar.value||0);
let tcMostrado=getTcMostrado();
let comisionVal=getComision();
if(operacion.value==="bs_soles"){
let recibeCalc=dep/(tcMostrado*(1+comisionVal));
return recibeCalc*comisionVal*tcMostrado;
}else{
return dep*tcMostrado*comisionVal;
}
}

function actualizarHora(){
const ahora=new Date();
let horas=ahora.getHours();
const minutos=String(ahora.getMinutes()).padStart(2,'0');
const ampm=horas>=12?'PM':'AM';
horas=horas%12;
horas=horas?horas:12;
const horaStr=String(horas).padStart(2,'0')+":"+minutos+" "+ampm;
if(horaCentral)horaCentral.textContent=horaStr;
if(ahFooter)ahFooter.textContent="A:H";
}

btnConfig.addEventListener("click",function(){
configAbierto=!configAbierto;
if(configAbierto){
configPanel.classList.add("abierto");
btnConfig.style.background="#f59e0b";
btnConfig.style.transform="rotate(180deg)";
}else{
configPanel.classList.remove("abierto");
btnConfig.style.background="#374151";
btnConfig.style.transform="rotate(0deg)";
}
});

function actualizarFecha(){
const fecha=new Date();
const meses=["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];
const fechaStr=String(fecha.getDate()).padStart(2,'0')+" "+meses[fecha.getMonth()]+" "+fecha.getFullYear();
if(fechaText)fechaText.textContent=fechaStr;
}

function calcular(){
let dep=parseFloat(depositar.value||0);
let rec=parseFloat(recibe.value||0);
let tcMostrado=getTcMostrado();
let comisionVal=getComision();
let comisionPorcentaje=parseFloat(comision.value||0);

if(operacion.value==="bs_soles"){
operacionTexto.textContent="BOLIVIANOS → SOLES";
if(ultimoCampo==="depositar"){
rec=dep/(tcMostrado*(1+comisionVal));
recibe.value=rec?formato(rec):"";
}else{
dep=rec*tcMostrado*(1+comisionVal);
depositar.value=dep?formato(dep):"";
}
}else{
operacionTexto.textContent="SOLES → BOLIVIANOS";
if(ultimoCampo==="depositar"){
rec=dep*tcMostrado*(1-comisionVal);
recibe.value=rec?formato(rec):"";
}else{
dep=rec/(tcMostrado*(1-comisionVal));
depositar.value=dep?formato(dep):"";
}
}

enviaVistaC.innerHTML=depositar.value||"0.00";
recibeVistaC.innerHTML=recibe.value||"0.00";

if(tcChaskysBar)tcChaskysBar.textContent="T/C "+formato(tcMostrado);

let comisionBs=0;
if(dep>0)comisionBs=getValorComisionBs();

if(comisionPorcentaje>0){
comisionCenterChaskys.textContent="COMISIÓN "+formato(comisionBs)+" BS ("+comisionPorcentaje+"%)";
comisionCenterChaskys.style.display="block";
}else{
comisionCenterChaskys.style.display="none";
}

refTc.innerHTML="T/C "+formato(tcMostrado);
actualizarMonedas();
}

depositar.addEventListener("input",()=>{ultimoCampo="depositar";calcular();});
recibe.addEventListener("input",()=>{ultimoCampo="recibe";calcular();});

[operacion,tcBsSoles,tcSolesBs,comision].forEach(item=>{
item.addEventListener("input",calcular);
item.addEventListener("change",calcular);
});

operacion.addEventListener("change",function(){actualizarMonedas();});

document.getElementById("btnLimpiar").addEventListener("click",()=>{
depositar.value="";
recibe.value="";
enviaVistaC.innerHTML="0.00";
recibeVistaC.innerHTML="0.00";
});

document.getElementById("btnGuardar").addEventListener("click",()=>{
html2canvas(document.getElementById("tarjeta"),{
scale:3,
backgroundColor:null,
useCORS:true,
logging:false,
width:document.getElementById("tarjeta").offsetWidth,
height:document.getElementById("tarjeta").offsetHeight
}).then(canvas=>{
const link=document.createElement("a");
link.download="cotizacion_chaskys.png";
link.href=canvas.toDataURL();
link.click();
});
});

});
